<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="theme-color" content="#0f141a" media="(prefers-color-scheme: dark)">

<title>Lazy Meal Planner</title>
<meta name="description" content="One pot, one pan, a rice cooker and an air fryer: plan a week of beginner-friendly Japanese meals, shop at LIFE, cook, and track what you save.">
<style>
  :root {
    color-scheme: light dark;
    --bg:#f2f5f7; --card:#ffffff; --ink:#15212e; --muted:#5b6b7b; --line:#d9e1e9;
    --accent:#2a5c8f; --accent-ink:#fff; --accent-soft:#e7eef6;
    --green:#1e7a4d; --green-soft:#e2f0e8; --blue:#2a5c8f; --blue-soft:#e7eef6;
    --gold:#b34725; --gold-soft:#f8e9e2; --press:#e9eef3; --ctrl:#7f909f;
    --shadow:0 1px 2px rgba(21,33,46,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0f141a; --card:#171e26; --ink:#e7edf3; --muted:#93a2b1; --line:#2a3542;
      --accent:#7aa7d8; --accent-ink:#0f141a; --accent-soft:#1e2c3d;
      --green:#69bd8c; --green-soft:#1c2f24; --blue:#7aa7d8; --blue-soft:#1e2c3d;
      --gold:#d98a70; --gold-soft:#33241d; --press:#212a35; --ctrl:#576a80;
      --shadow:0 1px 2px rgba(0,0,0,.35);
    }
  }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html { height:100%; }
  body { background:var(--bg); color:var(--ink); min-height:100%;
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;
    padding-bottom:calc(76px + env(safe-area-inset-bottom)); }
  body::before { content:""; position:fixed; top:0; left:0; right:0; height:3px; background:var(--accent); z-index:20; }
  header.top { padding:calc(16px + env(safe-area-inset-top)) 20px 6px; max-width:640px; margin:0 auto; }
  header.top h1 { font-size:21px; letter-spacing:-.01em; }
  .hmark { display:inline-block; width:10px; height:10px; border-radius:50%; background:#c9412b; margin-right:9px; }
  .hsub { color:var(--muted); font-size:13.5px; margin-top:1px; }
  main { max-width:640px; margin:0 auto; padding:10px 16px 24px; }
  .tab { display:none; } .tab.on { display:block; animation:fade .18s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(4px)} to{opacity:1} }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:22px 4px 8px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
  .hint { font-size:13.5px; color:var(--muted); background:var(--accent-soft); border-radius:8px; padding:10px 12px; margin-top:10px; line-height:1.45; }
  .hint b { color:var(--ink); }
  /* ---- controls ---- */
  .rowb { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .lbl { font-size:15px; font-weight:600; }
  .stepper { display:flex; align-items:center; gap:2px; }
  .stepper button { width:44px; height:44px; border-radius:10px; border:1px solid var(--ctrl); background:var(--card); color:var(--accent); font-size:24px; font-weight:600; cursor:pointer; }
  .stepper button:active { background:var(--press); }
  .stepper b { min-width:52px; text-align:center; font-size:22px; }
  .seg { display:flex; background:var(--press); border-radius:8px; padding:3px; margin-top:8px; }
  .seg button { flex:1; min-height:44px; border:none; border-radius:6px; background:transparent; color:var(--muted); font:600 13.5px/1.25 inherit; cursor:pointer; padding:6px 4px; }
  .seg button.on { background:var(--card); color:var(--ink); box-shadow:var(--shadow); }
  .cta { display:block; width:100%; min-height:52px; border:none; border-radius:8px; background:var(--accent); color:var(--accent-ink); font:700 17px inherit; cursor:pointer; margin-top:16px; }
  .cta:active { filter:brightness(1.08); }
  button.mini { min-height:44px; padding:8px 14px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--accent); font:600 14px inherit; cursor:pointer; }
  button.mini:active { background:var(--press); }
  button.mini.locked { color:var(--gold); border-color:var(--gold); background:var(--gold-soft); }
  /* ---- chips ---- */
  .chip { display:inline-block; font-size:11.5px; font-weight:600; padding:3px 8px; border-radius:4px; margin:2px 4px 0 0; }
  .gear { background:var(--blue-soft); color:var(--blue); }
  .batch { background:var(--green-soft); color:var(--green); }
  .fresh { background:var(--gold-soft); color:var(--gold); }
  .flexchip { background:var(--gold-soft); color:var(--gold); }
  /* ---- dish cards (plan) ---- */
  .dish { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); }
  .dish .name { font-weight:700; font-size:16.5px; }
  .dish .jp { color:var(--muted); font-size:12.5px; font-weight:400; }
  .serv { float:right; background:var(--accent-soft); color:var(--accent); font-weight:700; font-size:13px; padding:4px 9px; border-radius:6px; }
  @media (prefers-color-scheme: dark){ .serv{ color:var(--ink);} }
  .dish .acts { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  /* ---- shop rows ---- */
  .prog { height:10px; background:var(--press); border-radius:5px; overflow:hidden; margin:10px 0 6px; }
  .prog i { display:block; height:100%; background:var(--green); border-radius:5px; transition:width .25s ease; }
  .grow { display:flex; align-items:center; gap:12px; min-height:54px; padding:8px 4px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none; -webkit-user-select:none; }
  .grow:last-child { border-bottom:none; }
  .grow:active { background:var(--press); }
  .tick { flex:0 0 28px; height:28px; border-radius:8px; border:2px solid var(--ctrl); display:flex; align-items:center; justify-content:center; color:transparent; font-size:15px; font-weight:800; transition:all .15s; }
  .grow.done .tick { background:var(--green); border-color:var(--green); color:#fff; }
  .grow .what { flex:1; min-width:0; }
  .grow .what b { font-size:15.5px; font-weight:600; }
  .grow .what .jp { color:var(--muted); font-size:12.5px; }
  .grow.done .what { opacity:.4; } .grow.done .what b { text-decoration:line-through; }
  .grow .amt { text-align:right; font-size:13.5px; color:var(--muted); white-space:nowrap; line-height:1.35; }
  .grow .amt b { display:block; color:var(--ink); font-size:14.5px; }
  .grow.done .amt { opacity:.4; }
  .ghead { font-size:12.5px; font-weight:700; color:var(--muted); padding:14px 4px 4px; text-transform:uppercase; letter-spacing:.05em; }
  details.shelf summary { min-height:44px; display:flex; align-items:center; font-weight:600; color:var(--accent); cursor:pointer; list-style:none; }
  details.shelf summary::-webkit-details-marker { display:none; }
  /* ---- cook ---- */
  details.rec { background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden; }
  details.rec summary { display:flex; align-items:center; gap:10px; min-height:60px; padding:12px 16px; cursor:pointer; list-style:none; }
  details.rec summary::-webkit-details-marker { display:none; }
  details.rec .rb { padding:2px 16px 16px; }
  details.rec ol { padding-left:22px; margin:10px 0 4px; }
  details.rec li { font-size:16.5px; line-height:1.55; margin-bottom:10px; }
  .ing { color:var(--muted); font-size:14px; line-height:1.5; }
  .gtip { font-size:13px; background:var(--accent-soft); border-radius:8px; padding:8px 10px; margin:6px 0; line-height:1.4; color:var(--ink); }
  .sched p { margin-bottom:10px; font-size:15px; }
  .sched .day { font-weight:700; color:var(--blue); }
  /* ---- save ---- */
  .stats { display:flex; gap:10px; }
  .stat { flex:1; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; box-shadow:var(--shadow); }
  .stat b { display:block; font-size:19px; } .stat.sv b { color:var(--green); }
  .stat span { font-size:11.5px; color:var(--muted); }
  input[type=number] { min-height:48px; padding:6px 12px; border:1px solid var(--ctrl); border-radius:8px; width:130px; font:16px inherit; background:var(--card); color:var(--ink); }
  .logrow { display:flex; align-items:center; gap:8px; font-size:14px; min-height:44px; }
  .bar { height:8px; background:var(--green); border-radius:4px; min-width:2px; }
  .del { min-width:44px; min-height:44px; border:none; background:none; color:var(--muted); font-size:15px; cursor:pointer; }
  .empty { text-align:center; color:var(--muted); padding:44px 16px; font-size:15px; }
  /* ---- tab bar ---- */
  nav.tabbar { position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center;
    background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); z-index:10; }
  nav.tabbar .inner { display:flex; width:100%; max-width:640px; }
  nav.tabbar button { flex:1; min-height:58px; border:none; background:none; color:var(--muted); font:600 11px inherit; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  nav.tabbar button .ic { font-size:22px; line-height:1; }
  nav.tabbar button.on { color:var(--accent); }
  button:focus-visible, input:focus-visible, summary:focus-visible, .grow:focus-visible, details.rec li:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:8px; }
  #undobar { position:fixed; left:50%; transform:translateX(-50%); bottom:calc(72px + env(safe-area-inset-bottom)); background:var(--ink); color:var(--bg); border-radius:10px; padding:10px 8px 10px 16px; font-size:14px; display:none; align-items:center; gap:4px; z-index:30; box-shadow:0 4px 16px rgba(0,0,0,.3); max-width:92vw; white-space:nowrap; }
  #undobar.show { display:flex; animation:fade .18s ease; }
  #undobar button { border:none; background:none; color:inherit; font:700 14px inherit; cursor:pointer; min-height:44px; padding:0 12px; text-decoration:underline; flex:0 0 auto; }
  #undomsg { min-width:0; overflow:hidden; text-overflow:ellipsis; }
  details.rec li { cursor:pointer; user-select:none; -webkit-user-select:none; }
  details.rec li.done { opacity:.45; text-decoration:line-through; }
  .prices .logrow input { width:88px; min-height:44px; }
  .prices .logrow { border-bottom:1px solid var(--line); } .prices .logrow:last-of-type { border-bottom:none; }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
</style>
</head>

<header class="top">
  <h1><span class="hmark"></span>Lazy Meal Planner</h1>

<main>
  <div class="tab" id="tab-plan"></div>

<script>
/* ============ CONDIMENT CORE ============ */
const CONDS = {
  soy:{n:"Soy sauce",jp:"醤油",p:250}, mirin:{n:"Mirin",jp:"みりん風調味料",p:300},
  sake:{n:"Cooking sake",jp:"料理酒",p:250}, mentsuyu:{n:"Mentsuyu (3x)",jp:"めんつゆ 3倍濃縮",p:300},
  sesame:{n:"Sesame oil",jp:"ごま油",p:350}, oyster:{n:"Oyster sauce",jp:"オイスターソース",p:250},
  torigara:{n:"Chicken stock powder",jp:"鶏ガラスープの素",p:300}, dashi:{n:"Hondashi",jp:"ほんだし",p:350},
  roux:{n:"Curry roux",jp:"カレールー",p:250}, miso:{n:"Miso",jp:"味噌",p:350},
  mayo:{n:"Kewpie mayo",jp:"マヨネーズ",p:250}, garlic:{n:"Garlic tube",jp:"にんにくチューブ",p:150},
  ginger:{n:"Ginger tube",jp:"生姜チューブ",p:150}, oil:{n:"Cooking oil",jp:"サラダ油",p:300},
  katakuriko:{n:"Potato starch",jp:"片栗粉",p:200},
  ponzu:{n:"Ponzu",jp:"ポン酢",p:300},
  ketchup:{n:"Ketchup",jp:"ケチャップ",p:200}
};
/* ============ INGREDIENTS ============ */
const ING = {
  chicken:{n:"Chicken thigh",jp:"鶏もも肉",u:"g",p:1.3,cat:"meat"},
  pork:{n:"Pork komagire",jp:"豚こま切れ",u:"g",p:1.4,cat:"meat"},
  beef:{n:"Beef komagire",jp:"牛こま切れ",u:"g",p:2.8,cat:"meat"},
  gpork:{n:"Ground pork",jp:"豚ひき肉",u:"g",p:1.2,cat:"meat"},
  bacon:{n:"Bacon",jp:"ベーコン",u:"g",p:2.0,cat:"meat"},
  salmon:{n:"Salted salmon fillet",jp:"塩鮭切身",u:"pc",p:250,cat:"meat"},
  egg:{n:"Eggs",jp:"卵",u:"pc",p:30,cat:"other"},
  tofu:{n:"Tofu (block)",jp:"木綿豆腐",u:"pc",p:100,cat:"other"},
  kimchi:{n:"Kimchi",jp:"キムチ",u:"g",p:0.9,cat:"other"},
  onion:{n:"Onion",jp:"玉ねぎ",u:"pc",p:50,cat:"veg"},
  carrot:{n:"Carrot",jp:"にんじん",u:"pc",p:60,cat:"veg"},
  potato:{n:"Potato",jp:"じゃがいも",u:"pc",p:60,cat:"veg"},
  cabbage:{n:"Cabbage",jp:"キャベツ",u:"g",p:0.4,cat:"veg"},
  moyashi:{n:"Bean sprouts",jp:"もやし",u:"g",p:0.2,cat:"veg"},
  shimeji:{n:"Shimeji mushrooms",jp:"しめじ",u:"g",p:1.0,cat:"veg"},
  daikon:{n:"Daikon",jp:"大根",u:"g",p:0.35,cat:"veg"},
  negi:{n:"Green onion",jp:"長ねぎ",u:"pc",p:120,cat:"veg"},
  cucumber:{n:"Cucumber",jp:"きゅうり",u:"pc",p:60,cat:"veg"},
  cantomato:{n:"Canned tomato",jp:"カットトマト缶",u:"g",p:0.3,cat:"dry"},
  pasta:{n:"Pasta",jp:"スパゲッティ",u:"g",p:0.3,cat:"dry"},
  fbroc:{n:"Frozen broccoli",jp:"冷凍ブロッコリー",u:"g",p:0.6,cat:"frozen"},
  fveg:{n:"Frozen mixed veg",jp:"冷凍ミックスベジタブル",u:"g",p:0.5,cat:"frozen"},
  udon:{n:"Frozen udon",jp:"冷凍うどん",u:"g",p:0.25,cat:"frozen"},
  panko:{n:"Panko",jp:"パン粉",u:"g",p:0.4,cat:"dry"},
  tuna:{n:"Tuna can",jp:"ツナ缶",u:"pc",p:120,cat:"dry"},
  tomato:{n:"Tomato",jp:"トマト",u:"pc",p:100,cat:"veg"},
  yakisoba:{n:"Yakisoba noodles",jp:"焼きそば麺（ソース付き）",u:"pc",p:60,cat:"other"},
  gyoza:{n:"Frozen gyoza",jp:"冷凍餃子",u:"g",p:0.5,cat:"frozen"}
};
const CATS = {meat:"🥩 Meat & fish 肉・魚", veg:"🥬 Produce 野菜", other:"🥚 Chilled 卵・豆腐", dry:"🍝 Dry & canned 乾物・缶", frozen:"🧊 Frozen 冷凍"};
/* ============ RECIPES (qty per serving) ============ */
const RECIPES = [
 {id:"hainan", n:"Rice-cooker Hainanese chicken rice", jp:"炊飯器カオマンガイ", gear:["rice"], time:"5 min prep", batch:true, cap:2,
  ing:[["chicken",150],["cucumber",0.3]], rice:1, conds:["torigara","ginger","garlic","sesame","soy"],
  steps:["Per serving: rinse 150 g rice (1 rice-cooker cup) in cold water, swishing with your hand, until the water runs mostly clear — about 3 changes of water. Drain, into the cooker.","Add water to just UNDER the 1-cup line (the chicken will release juice). Stir in 1 tsp (3 g) chicken stock powder + a 2 cm squeeze each of garlic and ginger tube.","Lay the chicken thigh on top, skin side up. Do not stir it in. Close the lid, press cook (normal white-rice mode).","When it beeps (~50 min), lift the chicken onto a cutting board, rest it 5 min, then slice into 1 cm strips.","Sauce: mix 15 ml (1 tbsp) soy sauce + 5 ml (1 tsp) sesame oil in a small bowl. Slice a third of a cucumber. Chicken and sauce over the rice."]},
 {id:"takikomi", n:"Chicken & mushroom takikomi gohan", jp:"炊き込みご飯", gear:["rice"], time:"7 min prep", batch:true, cap:2,
  ing:[["chicken",80],["shimeji",50],["carrot",0.3]], rice:1, conds:["mentsuyu"],
  steps:["Per serving: rinse 150 g rice until the water runs mostly clear, drain, into the cooker.","Add water to the 1-cup line, then scoop OUT 45 ml (3 tbsp). Add 45 ml (3 tbsp) mentsuyu in its place.","Cut 80 g chicken into 2 cm pieces. Cut the tough base off the shimeji and tear the clump apart by hand. Slice a third of a carrot into thin half-moons.","Scatter chicken, shimeji, and carrot on TOP of the rice — do not stir, sitting on top is correct. Press cook.","When it beeps, fluff with the paddle and let it rest 5 min with the lid open a crack. Leftovers: press into balls while warm, wrap, freeze."]},
 {id:"kimchirice", n:"Pork-kimchi rice cooker rice", jp:"豚キムチ炊き込みご飯", gear:["rice"], time:"5 min prep", batch:true, cap:2, flex:true,
  ing:[["pork",100],["kimchi",80]], rice:1, conds:["torigara","sesame"],
  steps:["Per serving: rinse 150 g rice, drain, into the cooker. Water to just under the 1-cup line.","Stir in 1 tsp (3 g) chicken stock powder.","Pile 100 g pork and 80 g kimchi — including its juice — on top of the rice. No stirring. Press cook.","When it beeps, fluff everything together and drizzle 5 ml (1 tsp) sesame oil per serving. A dab of your belachan on top works."]},
 {id:"curry", n:"Japanese curry", jp:"カレーライス", gear:["pot","rice"], time:"30 min", batch:true, cap:4, flex:true, freeze:"freeze without potato",
  ing:[["chicken",120],["onion",0.5],["carrot",0.3],["potato",0.8]], rice:1, conds:["roux","oil"],
  steps:["Cut, per serving: half an onion into thick wedges, a third of a carrot into chunky pieces, 1 small potato into quarters, 120 g chicken into bite-size pieces.","Pot on medium-high with 15 ml (1 tbsp) oil. Brown the chicken ~2 min, then add all the vegetables and stir 2 min.","Add water to just cover everything (roughly 200 ml per serving). Bring to a boil, spoon off the grey foam, then lid on and simmer on medium-low 15 min — done when a chopstick slides into a potato easily.","Turn the heat OFF. Drop in 1 roux block (25 g) per serving and stir until fully melted — adding roux off-heat stops it clumping.","Heat back on low for 5 min, stirring so the bottom does not catch, until it is thick like gravy. Serve over rice from the cooker."]},
 {id:"keema", n:"Keema curry", jp:"キーマカレー", gear:["pot","rice"], time:"20 min", batch:true, cap:4, flex:true, freeze:"freezes perfectly",
  ing:[["gpork",120],["onion",0.5],["cantomato",100],["fveg",50]], rice:1, conds:["roux","garlic","ginger","oil"],
  steps:["Dice half an onion per serving as small as you can manage. Pot or deep pan on medium with 15 ml (1 tbsp) oil, 2 cm each garlic and ginger tube, and the onion — fry ~3 min until it turns translucent.","Add 120 g ground pork per serving. Break it apart with the spatula and fry until no pink remains.","Add 100 g canned tomato + 50 g frozen veg + 50 ml water per serving. Simmer on medium-low 10 min, stirring occasionally.","Heat OFF, melt in 1 roux block (25 g) per serving. Back on low ~2 min until thick.","Serve over rice. Once cool, portion into containers: 3 days fridge, 1 month freezer."]},
 {id:"nikujaga", n:"Nikujaga (meat & potato stew)", jp:"肉じゃが", gear:["pot"], time:"25 min", batch:true, cap:4, flex:true,
  ing:[["pork",100],["potato",1.2],["onion",0.5],["carrot",0.3]], rice:1, conds:["mentsuyu"],
  steps:["Cut, per serving: 1 potato into quarters, half an onion into wedges, a third of a carrot into chunks.","Pot on medium-high, 5 ml (1 tsp) oil, brown 100 g pork per serving for about 1 min.","Add the vegetables, then water to ALMOST cover (~150 ml per serving) plus 40 ml mentsuyu per serving (ratio: 1 part mentsuyu to 4 parts water).","Bring to a boil, skim the foam, then lid slightly ajar and simmer medium-low 15–20 min until a fork goes into the potato with no resistance.","Heat off and rest 10 min before eating — it soaks up flavour as it cools. Genuinely better tomorrow."]},
 {id:"tonjiru", n:"Tonjiru (pork miso soup) + rice", jp:"豚汁", gear:["pot","rice"], time:"20 min", batch:true, cap:4,
  ing:[["pork",80],["daikon",80],["carrot",0.3],["onion",0.3],["negi",0.2]], rice:1, conds:["miso","dashi","sesame"],
  steps:["Cut, per serving: 80 g pork into bite-size pieces, 80 g daikon into thin quarter-slices, a third each of carrot (half-moons) and onion (wedges).","Pot on medium, 5 ml (1 tsp) sesame oil. Fry the pork first, then the vegetables, 2–3 min.","Add 300 ml water + half a tsp hondashi per serving. Simmer 10–15 min until the daikon turns translucent.","Heat OFF. Put 18 g (1 tbsp) miso per serving in a ladle, dissolve it in the ladle with some broth, then stir through — boiling miso kills its flavour, so always off-heat.","Sliced negi on top. Serve with a bowl of rice — this is a full meal."]},

const EAT_OUT = 1000;
const GEARICON = {rice:"🍚 rice cooker", pot:"🍲 pot", pan:"🍳 pan", air:"💨 air fryer"};
const yen = x => (x<0?"−":"")+"¥"+Math.abs(Math.round(x)).toLocaleString();

/* ============ STATE (schema-compatible with v2) ============ */
let S = {};
try { S = JSON.parse(localStorage.getItem("lmp")||"{}"); } catch(e) { S = {}; }
if (typeof S !== "object" || S === null || Array.isArray(S)) S = {};
const isObj = x => x && typeof x === "object" && !Array.isArray(x);
S.owned = isObj(S.owned) ? S.owned : {oil:true};
S.locked = Array.isArray(S.locked) ? S.locked : [];
S.bought = isObj(S.bought) ? S.bought : {};
S.protein = isObj(S.protein) ? S.protein : {};
S.log = Array.isArray(S.log) ? S.log.filter(l=>isObj(l)&&typeof l.spent==="number"&&typeof l.meals==="number") : [];
S.N = Number.isInteger(S.N) && S.N>=1 && S.N<=14 ? S.N : 7;
S.v = [1,2,3].includes(S.v) ? S.v : 2;
S.tab = ["plan","shop","cook","save"].includes(S.tab) ? S.tab : "plan";
S.stepdone = isObj(S.stepdone) ? S.stepdone : {};
S.price = isObj(S.price) ? Object.fromEntries(Object.entries(S.price).filter(([k,v])=>ING[k] && typeof v==="number" && isFinite(v) && v>0)) : {};
S.aircap = Number.isInteger(S.aircap) && S.aircap>=1 && S.aircap<=6 ? S.aircap : 2;
if (S.plan !== undefined) { S.plan = Array.isArray(S.plan) ? S.plan.filter(x=>typeof x==="string") : undefined; if (S.plan && !S.plan.length) S.plan = undefined; }
function save(){ try { localStorage.setItem("lmp", JSON.stringify(S)); } catch(e) {} }
const priceOf = id => S.price[id] !== undefined ? S.price[id] : ING[id].p;
const capOf = r => (r.gear && r.gear.includes("air") && r.cap) ? S.aircap : r.cap;

/* ============ UNDO (1 level, session only) ============ */
let UNDO = null, undoTimer = null, priceOpen = false;
function snapUndo(msg){
  UNDO = { msg, s: JSON.parse(JSON.stringify({ plan:S.plan||null, locked:S.locked, protein:S.protein, bought:S.bought, stepdone:S.stepdone })) };
}
function showUndo(){
  if (!UNDO) return;
  const el = document.getElementById("undobar");
  document.getElementById("undomsg").textContent = UNDO.msg;
  el.classList.add("show");
  clearTimeout(undoTimer); undoTimer = setTimeout(hideUndo, 6000);
}
function hideUndo(){ document.getElementById("undobar").classList.remove("show"); UNDO = null; }
function undoNow(){
  if (!UNDO) return;
  const u = UNDO.s;
  if (u.plan) S.plan = u.plan; else delete S.plan;
  S.locked = u.locked; S.protein = u.protein; S.bought = u.bought; S.stepdone = u.stepdone;
  hideUndo(); save(); render();
}

/* ============ ACTIONS ============ */
function setTab(t){ S.tab=t; save(); render(); try{ scrollTo(0,0); }catch(e){} }
function stepMeals(d){ S.N = Math.min(14, Math.max(1, S.N+d)); save(); if (S.plan) plan(S.N<=2?true:"keep"); else render(); }
function setVariety(v){ S.v=v; save(); plan(true); }
function eligible(){ return RECIPES; }
function plan(reshuffle){
  const N = S.N, v = S.v;
  const short = N<=2; /* travel week: fresh quick dishes only, no batching */
  const k = short ? N : v===1 ? 1 : v===2 ? Math.min(3, Math.max(2, Math.ceil(N/3))) : Math.min(N, 6);
  let pool = eligible();
  if (short) pool = pool.filter(r=>!r.batch);
  else if (v===1) pool = pool.filter(r=>r.batch);
  const locked = pool.filter(r=>S.locked.includes(r.id)).slice(0,k);
  let picks = [...locked];
  let undid = false;
  if (reshuffle!=="keep" || !S.plan) {
    if (S.plan) { snapUndo("New week generated"); undid = true; }
    S.bought = {}; S.stepdone = {};
    const rest = pool.filter(r=>!picks.some(p=>p.id===r.id)).sort(()=>Math.random()-.5);
    rest.sort((a,b)=> (N/k>=3 ? (b.batch?1:0)-(a.batch?1:0) : 0));
    while (picks.length<k && rest.length) picks.push(rest.shift());
    S.plan = picks.map(r=>r.id);
  }
  save(); render();
  if (undid) showUndo();
}
function swap(id){
  let pool = eligible().filter(r=>!S.plan.includes(r.id));
  if (S.N<=2) pool = pool.filter(r=>!r.batch);
  else if (S.v===1) pool = pool.filter(r=>r.batch);
  if (!pool.length) return;
  const nu = pool[Math.floor(Math.random()*pool.length)];
  snapUndo(`Swapped in ${nu.n}`);
  S.plan = S.plan.map(x=>x===id?nu.id:x);
  S.locked = S.locked.filter(x=>x!==id);
  save(); render(); showUndo();
}
function lock(id){
  S.locked = S.locked.includes(id) ? S.locked.filter(x=>x!==id) : [...S.locked, id];
  save(); render();
}
function toggleCond(id){ S.owned[id]=!S.owned[id]; save(); render(); }
function toggleBought(id){ S.bought[id]=!S.bought[id]; save(); render(); }
function clearTicks(){ snapUndo("Basket ticks cleared"); S.bought={}; save(); render(); showUndo(); }
const MEATCYCLE = ["chicken","pork","beef","gpork"];
const baseMeat = r => (r.ing.find(([id])=>ING[id].cat==="meat")||[null])[0];
function ingsOf(r){ return r.ing.map(([id,q])=> (r.flex && S.protein[r.id] && id===baseMeat(r)) ? [S.protein[r.id],q] : [id,q]); }
function cycleProtein(rid){
  const r = RECIPES.find(x=>x.id===rid), b = baseMeat(r);
  const cyc = MEATCYCLE.includes(b) ? MEATCYCLE : [b, ...MEATCYCLE];
  const cur = S.protein[rid]||b, nxt = cyc[(cyc.indexOf(cur)+1)%cyc.length];
  if (nxt===b) delete S.protein[rid]; else S.protein[rid]=nxt;
  save(); render();
}
function logWeek(){
  const v = +document.getElementById("spent").value;
  if (!v || v<0) return;
  S.log.push({d:new Date().toISOString().slice(0,10), spent:v, meals:S.N});
  save(); render();
}
function delLog(i){ if(!confirm("Remove this logged week?")) return; S.log.splice(i,1); save(); render(); }
function kb(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); e.currentTarget.click(); } }
function toggleStep(el, rid, i){
  const d = S.stepdone[rid] = S.stepdone[rid] || {};
  if (d[i]) delete d[i]; else d[i] = true;
  if (!Object.keys(d).length) delete S.stepdone[rid];
  save();
  if (el) { el.classList.toggle("done", !!d[i]); el.setAttribute("aria-checked", String(!!d[i])); }
}
function stepAir(d){ S.aircap = Math.min(6, Math.max(1, S.aircap+d)); save(); render(); }
function setPrice(id, v){
  v = +v;
  const it = ING[id];
  if (!it || !isFinite(v) || v<=0) { render(); return; }
  const p = it.u==="pc" ? v : v/100;
  if (Math.abs(p-it.p) < 1e-9) delete S.price[id]; else S.price[id] = p;
  save(); render();
}
function resetPrices(){ if(!confirm("Reset all prices to defaults?")) return; S.price = {}; save(); render(); }
let wlock = null, wakeWanted = false;
async function toggleWake(){
  wakeWanted = !wakeWanted;
  try {
    if (!wakeWanted && wlock) { await wlock.release(); wlock = null; }
    else if (wakeWanted) {
      wlock = await navigator.wakeLock.request("screen");
      wlock.addEventListener("release", ()=>{ wlock = null; });
    }
  } catch(e) { wakeWanted = false; wlock = null; }
  render();
}
document.addEventListener("visibilitychange", async ()=>{
  if (document.visibilityState==="visible" && wakeWanted && !wlock) {
    try { wlock = await navigator.wakeLock.request("screen"); wlock.addEventListener("release", ()=>{ wlock = null; }); } catch(e){}
  }
});

/* ============ DERIVED ============ */
function compute(){
  if (!S.plan) return null;
  const picks = S.plan.map(id=>RECIPES.find(r=>r.id===id)).filter(Boolean);
  if (!picks.length) return null;
  const N = S.N, servings = {};
  picks.forEach((r,i)=>{ servings[r.id] = Math.floor(N/picks.length) + (i < N%picks.length ? 1 : 0); });
  const g = {}; let riceGo = 0;
  picks.forEach(r=>{
    const s = servings[r.id];
    riceGo += (r.rice||0)*s;
    ingsOf(r).forEach(([id,q])=>{ g[id]=(g[id]||0)+q*s; });
  });
  let food = 0;
  const rows = Object.entries(g).map(([id,q])=>{
    const it = ING[id];
    const buy = it.u==="pc" ? Math.ceil(q) : Math.ceil(q/50)*50;
    const cost = buy*priceOf(id); food += cost;
    return {id, cat:it.cat, n:it.n, jp:it.jp, disp: it.u==="pc" ? buy+(buy>1?" pcs":" pc") : buy+" g", cost};
  });
  const needed = [...new Set(picks.flatMap(r=>r.conds))];
  return {picks, servings, N, rows, food, riceGo, needed};
}

/* ============ RENDER ============ */
const EMPTY = t => `<div class="card"><div class="empty">${t}</div></div>`;
const EMPTYGO = t => `<div class="card"><div class="empty">${t}<br><button class="mini" style="margin-top:14px" onclick="setTab('plan')">🗓 Go to Plan</button></div></div>`;
function gearTips(r, s){
  const t = [];
  const cp = capOf(r);
  if (cp && s>cp) t.push(cp===1
    ? `⚙️ This dish only works one serving at a time — do ${s} quick rounds back-to-back.`
    : `⚙️ ×${s} servings won&#39;t fit in one go — cook ${Math.ceil(s/cp)} rounds of ~${cp}.`);
  if (r.kettle) t.push("⚡ Boil the 0.8 L kettle first, pour into the pot — saves ~5 min.");
  if (r.crowd) t.push("🍳 Doing 2+ servings at once? Split into rounds — a crowded 26 cm pan steams instead of sears.");
  return t;
}
function render(){
  const c = compute();
  document.getElementById("hsub").innerHTML = c
    ? `${c.N} meals · ${yen(c.food)} groceries · <span style="color:var(--green);font-weight:600">saves ${yen(c.N*EAT_OUT-c.food)}</span>`
    : "One pot · one pan · rice cooker · air fryer";
  renderPlan(c); renderShop(c); renderCook(c); renderSave(c); renderTabs(c);
  ["plan","shop","cook","save"].forEach(t=>{
    document.getElementById("tab-"+t).className = "tab"+(S.tab===t?" on":"");
  });
}
function renderTabs(c){
  const done = c ? c.rows.filter(r=>S.bought[r.id]).length : 0;
  const tabs = [["plan","🗓","Plan"],["shop","🛒","Shop"],["cook","🍳","Cook"],["save","📈","Save"]];
  document.getElementById("tabbar").innerHTML = tabs.map(([t,ic,l])=>
    `<button class="${S.tab===t?"on":""}" ${S.tab===t?'aria-current="page"':""} onclick="setTab('${t}')"><span class="ic" aria-hidden="true">${ic}</span>${l}${t==="shop"&&c&&done?` ${done}/${c.rows.length}`:""}</button>`).join("");
}
function renderPlan(c){
  const V = {1:"1 dish<br>max batch",2:"2–3 dishes",3:"Different<br>most days"};
  let h = `<div class="card">
    <div class="rowb"><span class="lbl">Meals at home this week</span>
      <div class="stepper"><button onclick="stepMeals(-1)" aria-label="fewer">−</button><b>${S.N}</b><button onclick="stepMeals(1)" aria-label="more">+</button></div>
    </div>
    <div class="seg">${[1,2,3].map(v=>`<button class="${S.v===v?"on":""}" onclick="setVariety(${v})">${V[v]}</button>`).join("")}</div>
    <button class="cta" onclick="plan(true)">🎲 Generate my week</button>
    ${S.N<=2?`<div class="hint">✈️ Short week: quick cook-fresh dishes only — no batching, no leftovers.</div>`:""}
  </div>`;
  if (c) {
    h += `<h2>This week</h2>` + c.picks.map(r=>`
      <div class="dish">
        <span class="serv">×${c.servings[r.id]}</span>
        <div class="name">${r.n}</div><div class="jp">${r.jp}</div>
        <div style="margin-top:6px">${r.gear.map(x=>`<span class="chip gear">${GEARICON[x]}</span>`).join("")}<span class="chip ${r.batch?"batch":"fresh"}">${r.batch?"batchable":"cook fresh"}</span>${r.flex?`<span class="chip flexchip">🏷️ any stickered meat</span>`:""}</div>
        <div class="acts">
          <button class="mini" onclick="swap('${r.id}')">↺ Swap</button>
          <button class="mini ${S.locked.includes(r.id)?"locked":""}" aria-pressed="${S.locked.includes(r.id)}" onclick="lock('${r.id}')">${S.locked.includes(r.id)?"🔒 Locked":"🔓 Lock"}</button>
          ${r.flex?`<button class="mini" onclick="cycleProtein('${r.id}')">↔ ${ING[S.protein[r.id]||baseMeat(r)].n}</button>`:""}
        </div>
      </div>`).join("");
  } else h += EMPTY("Tap <b>Generate my week</b> to get dishes, a grocery list, and a cook schedule.");
  document.getElementById("tab-plan").innerHTML = h;
}
function renderShop(c){
  if (!c) { document.getElementById("tab-shop").innerHTML = EMPTYGO("No plan yet — your grocery list appears here once you generate a week."); return; }
  const done = c.rows.filter(r=>S.bought[r.id]);
  const left = c.rows.filter(r=>!S.bought[r.id]).reduce((a,r)=>a+r.cost,0);
  let h = `<div class="card">
    <div class="rowb"><span class="lbl">${done.length} of ${c.rows.length} in the basket</span>
    ${done.length?`<button class="mini" onclick="clearTicks()">Clear</button>`:""}</div>
    <div class="prog"><i style="width:${c.rows.length?Math.round(done.length/c.rows.length*100):0}%"></i></div>
    <div style="color:var(--muted);font-size:14px">${left?`~${yen(left)} left to pick up`:"Basket complete 🎉"}</div>
  </div><div class="card" style="padding:4px 16px">`;
  ["meat","veg","other","dry","frozen"].forEach(cat=>{
    const items = c.rows.filter(r=>r.cat===cat);
    if (!items.length) return;
    h += `<div class="ghead">${CATS[cat]}</div>`;
    items.forEach(r=>{
      h += `<div class="grow ${S.bought[r.id]?"done":""}" role="checkbox" aria-checked="${!!S.bought[r.id]}" tabindex="0" onkeydown="kb(event)" onclick="toggleBought('${r.id}')">
        <span class="tick">✓</span>
        <div class="what"><b>${r.n}</b><div class="jp">${r.jp}</div></div>
        <div class="amt"><b>${r.disp}</b>${yen(r.cost)}</div>
      </div>`;
    });
  });
  h += `</div>`;
  const toBuy = c.needed.filter(x=>!S.owned[x]);
  if (toBuy.length) {
    h += `<h2>Condiments to grab (one-time)</h2><div class="card" style="padding:4px 16px">` +
      toBuy.map(x=>`<div class="grow" role="checkbox" aria-checked="false" tabindex="0" onkeydown="kb(event)" onclick="toggleCond('${x}')">
        <span class="tick">✓</span>
        <div class="what"><b>${CONDS[x].n}</b><div class="jp">${CONDS[x].jp}</div></div>
        <div class="amt"><b>${yen(CONDS[x].p)}</b></div>
      </div>`).join("") + `</div>`;
  }
  const shelf = Object.keys(CONDS).filter(x=>S.owned[x]);
  h += `<div class="card"><details class="shelf"><summary>🧂 Your shelf (${shelf.length}) — tap to manage</summary>` +
    (shelf.length?shelf.map(x=>`<div class="grow done" role="checkbox" aria-checked="true" tabindex="0" onkeydown="kb(event)" onclick="toggleCond('${x}')"><span class="tick">✓</span><div class="what"><b>${CONDS[x].n}</b><div class="jp">${CONDS[x].jp}</div></div></div>`).join(""):`<div class="empty">Nothing yet</div>`) +
    `</details></div>`;
  const edited = Object.keys(S.price).length;
  h += `<div class="card prices"><details class="shelf"${priceOpen?" open":""} ontoggle="priceOpen=this.open"><summary>💴 Tune prices to your receipts${edited?` (${edited} edited)`:""}</summary>
    <div style="color:var(--muted);font-size:13px;margin:4px 0 6px">Match these to what LIFE actually charges — every cost and saving updates. ¥ per 100 g, or ¥ per piece/pack/can.</div>` +
    Object.entries(ING).map(([id,it])=>{
      const cur = priceOf(id), disp = Math.round(it.u==="pc" ? cur : cur*100), ed = S.price[id]!==undefined;
      return `<div class="logrow"><span style="flex:1;min-width:0"><b>${it.n}</b>${ed?" ✏️":""}<span class="jp" style="color:var(--muted);font-size:12px"> ${it.jp}</span></span><span style="color:var(--muted);font-size:12.5px">${it.u==="pc"?"¥/pc":"¥/100g"}</span><input type="number" inputmode="numeric" min="1" value="${disp}" aria-label="price of ${it.n}" onchange="setPrice('${id}',this.value)"></div>`;
    }).join("") +
    `${edited?`<button class="mini" style="margin-top:10px" onclick="resetPrices()">Reset all to defaults</button>`:""}
  </details></div>
  <div class="hint">🕖 LIFE marks meat & fish down 20–50% in the evening (割引 stickers). 🏷️ dishes take whatever protein is cheapest — swap it in Plan.</div>
  <div class="hint">🌶️ Your stash: <b>belachan</b> lifts the stir-fry & kimchi rice; <b>chinchalok</b> + eggs = bonus 5-min omelette, or dip for the Hainanese chicken.</div>`;
  document.getElementById("tab-shop").innerHTML = h;
}
function renderCook(c){
  if (!c) { document.getElementById("tab-cook").innerHTML = EMPTYGO("No plan yet — recipes and your cook schedule appear here once you generate a week."); return; }
  const batchers = c.picks.filter(r=>r.batch && c.servings[r.id]>=3);
  const quick = c.picks.filter(r=>!batchers.includes(r));
  let sched = "";
  const rounds = r => { const cp = capOf(r); return cp && c.servings[r.id]>cp ? ` Your gear fits ~${cp} servings per run — do ${Math.ceil(c.servings[r.id]/cp)} rounds back-to-back.` : ""; };
  if (batchers[0]) sched += `<p><span class="day">Sunday batch (~45 min):</span> all ${c.servings[batchers[0].id]} servings of <b>${batchers[0].n}</b>${batchers[0].freeze?` — ${batchers[0].freeze}`:""}. Portion into containers.${rounds(batchers[0])}</p>`;
  if (batchers[1]) sched += `<p><span class="day">Wednesday top-up (~30 min):</span> batch <b>${batchers[1].n}</b>${batchers[1].freeze?` — ${batchers[1].freeze}`:""}.${rounds(batchers[1])}</p>`;
  batchers.slice(2).forEach(r=> sched += `<p><span class="day">Also batch:</span> <b>${r.n}</b> (${c.servings[r.id]} servings).${rounds(r)}</p>`);
  quick.forEach(r=> sched += `<p><span class="day">Cook fresh (${r.time}):</span> <b>${r.n}</b> × ${c.servings[r.id]} — ${r.batch?"batchable, but at this size fresher is easier":"too quick to be worth batching"}.</p>`);
  const rruns = Math.ceil(Math.ceil(c.riceGo)/3);
  sched += `<p><span class="day">Rice:</span> ${Math.ceil(c.riceGo)} rice-cooker cups (${Math.ceil(c.riceGo)*150} g dry) total. Your 3-cup JAJ-A550 maxes at 3 cups per run${rruns>1?` — that is ${rruns} runs; start the next one while you eat`:""}. Freeze flat portions, microwave to revive. Bonus: the tacook plate steams veg or a chicken thigh over plain rice while it cooks — a free side.</p>`;
  let h = `<div class="card">
    <div class="rowb"><span class="lbl">💨 Air fryer fits</span>
      <div class="stepper"><button onclick="stepAir(-1)" aria-label="fewer air-fryer servings per run">−</button><b style="font-size:18px">${S.aircap}</b><button onclick="stepAir(1)" aria-label="more air-fryer servings per run">+</button></div></div>
    <div style="color:var(--muted);font-size:13px;margin-top:4px">servings per run — sets the round counts on air-fryer dishes</div>
  </div>`;
  h += `<div class="card sched">${sched}</div><h2>Recipes</h2>`;
  if ("wakeLock" in navigator) h += `<div class="card"><button class="mini${wakeWanted?" locked":""}" aria-pressed="${wakeWanted}" style="width:100%" onclick="toggleWake()">${wakeWanted?"☀️ Screen staying awake — tap to stop":"🌙 Keep screen awake while cooking"}</button></div>`;
  h += `<div class="hint">👆 Tap a step to check it off as you cook — step ticks clear when you generate a new week.</div>`;
  h += c.picks.map(r=>`
    <details class="rec">
      <summary><div style="flex:1"><b>${r.n}</b> <span class="jp" style="color:var(--muted);font-size:12.5px">${r.jp}</span><div style="color:var(--muted);font-size:13px">${r.time} · ×${c.servings[r.id]} servings</div></div><span style="color:var(--muted)">▾</span></summary>
      <div class="rb">
        ${gearTips(r,c.servings[r.id]).map(t=>`<div class="gtip">${t}</div>`).join("")}
        <div class="ing"><b>Per serving:</b> ${ingsOf(r).map(([id,q])=>{const it=ING[id];return `${it.n} ${it.u==="pc"?(q<1?q:q)+" pc":q+" g"}`}).join(" · ")}${r.rice?` · rice 150 g (1 cup)`:""}<br><b>Shelf:</b> ${r.conds.map(x=>CONDS[x].n).join(", ")}</div>
        <ol>${r.steps.map((s,i)=>{const dn=!!(S.stepdone[r.id]&&S.stepdone[r.id][i]);return `<li class="${dn?"done":""}" role="checkbox" aria-checked="${dn}" tabindex="0" onkeydown="kb(event)" onclick="toggleStep(this,'${r.id}',${i})">${s}</li>`}).join("")}</ol>
      </div>
    </details>`).join("");
  document.getElementById("tab-cook").innerHTML = h;
}
function renderSave(c){
  const totSpent = S.log.reduce((a,l)=>a+l.spent,0);
  const totSaved = S.log.reduce((a,l)=>a+(l.meals*EAT_OUT-l.spent),0);
  let h = `<div class="stats">
    <div class="stat"><b>${S.log.length}</b><span>weeks logged</span></div>
    <div class="stat"><b>${yen(totSpent)}</b><span>total spent</span></div>
    <div class="stat sv"><b>${yen(totSaved)}</b><span>saved vs eating out</span></div>
  </div>
  <div class="card" style="margin-top:12px">
    <div class="lbl" style="margin-bottom:8px">What did this week actually cost?</div>
    <div style="display:flex;gap:10px;align-items:center">
      <input type="number" id="spent" inputmode="numeric" min="0" aria-label="What this week cost in yen" onkeydown="if(event.key==='Enter')logWeek()" placeholder="${c?Math.round(c.food):"e.g. 1700"}">
      <button class="mini" style="color:var(--accent-ink);background:var(--accent);border:none;flex:1" onclick="logWeek()">Log week</button>
    </div>`;
  if (S.log.length) {
    const maxSaved = Math.max(1,...S.log.map(l=>l.meals*EAT_OUT-l.spent));
    h += `<div style="margin-top:14px">` + S.log.map((l,i)=>{
      const sv = l.meals*EAT_OUT-l.spent;
      return `<div class="logrow"><span style="width:84px;color:var(--muted)">${l.d.slice(5)}</span><span style="width:66px">${yen(l.spent)}</span><div class="bar" style="width:${Math.max(2,Math.round(Math.max(0,sv)/maxSaved*36))}%"></div><span style="color:${sv>=0?"var(--green)":"var(--gold)"};font-weight:600;white-space:nowrap">${sv>=0?"+":""}${yen(sv)}</span><button class="del" onclick="delLog(${i})" aria-label="remove">✕</button></div>`;
    }).join("") + `</div>`;
  } else h += `<div class="hint">Log your real LIFE receipt each week and watch the savings stack up.</div>`;
  h += `</div>`;
  document.getElementById("tab-save").innerHTML = h;
}

render();
</script>
</body>
</html>
